<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HUCE Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a202c;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background: #2d3748;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .form-control {
            background: #4a5568;
            border: none;
            color: white;
            height: 50px;
        }

        .form-control:focus {
            background: #4a5568;
            color: white;
            box-shadow: 0 0 0 2px #3182ce;
        }

        .btn-primary {
            background: #3182ce;
            border: none;
            height: 50px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #2b6cb0;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #63b3ed;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="logo-text">HUCE CINEMA</div>

        <div class="mb-3">
            <label class="form-label text-secondary small">TÀI KHOẢN</label>
            <input type="text" id="username" class="form-control" placeholder="Nhập admin">
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary small">MẬT KHẨU</label>
            <input type="password" id="password" class="form-control" placeholder="Nhập 123">
        </div>

        <button class="btn btn-primary w-100" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p id="error-msg" class="text-danger mt-3 text-center small"></p>
    </div>

    <script>
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === 'admin' && p === '123') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "trangchinh.html";
            } else {
                document.getElementById('error-msg').innerText = "Tài khoản hoặc mật khẩu không đúng!";
            }
        }
    </script>
</body>

</html>
